<!doctype html>
<html lang="en-ZA">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="google-site-verification"
      content="cIp9ZHOmO0zYDFbt6JBv0zTtfYdSiELLJmA7Dy_4eT0"
    />

    <title>%SEO_TITLE%</title>
    <meta name="title" content="%SEO_TITLE%" />
    <meta name="description" content="%SEO_DESCRIPTION%" />
    <meta name="keywords" content="%SEO_KEYWORDS%" />
    <meta name="author" content="%SEO_SITE_NAME%" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="%SITE_URL%/" />

    <meta name="geo.region" content="ZA" />
    <meta name="geo.placename" content="South Africa" />
    <meta name="language" content="English" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="%SITE_URL%/" />
    <meta property="og:title" content="%SEO_TITLE%" />
    <meta property="og:description" content="%SEO_DESCRIPTION%" />
    <meta property="og:image" content="%SEO_OG_IMAGE%" />
    <meta property="og:site_name" content="%SEO_SITE_NAME%" />
    <meta property="og:locale" content="%SEO_LOCALE%" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="%SITE_URL%/" />
    <meta name="twitter:title" content="%SEO_TITLE%" />
    <meta name="twitter:description" content="%SEO_DESCRIPTION%" />
    <meta name="twitter:image" content="%SEO_OG_IMAGE%" />

    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://api.fontshare.com/v2/css?f[]=public-sans@400,500,700,900&f[]=cabinet-grotesk@1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <script type="application/ld+json">
      %SEO_STRUCTURED_DATA%
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
